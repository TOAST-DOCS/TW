<svg viewBox="0 0 950 1200" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, 'Malgun Gothic', sans-serif">

  <!-- Background -->
  <rect x="0" y="0" width="950" height="1200" fill="#FCFCFC"/>

  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#191919">로드밸런서 멤버 INACTIVE 상태 진단 플로우차트</text>

  <!-- ===================== Start Box ===================== -->
  <rect x="270" y="50" width="260" height="60" rx="0" fill="#FFFFFF" stroke="#64748B" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-size="15" font-weight="600" fill="#191919">멤버 상태가 INACTIVE</text>

  <!-- Arrow: Start -> Q1 -->
  <line x1="400" y1="110" x2="400" y2="178" stroke="#191919" stroke-width="2"/>
  <polygon points="393,178 407,178 400,190" fill="#191919"/>

  <!-- ===================== Q1 Diamond ===================== -->
  <polygon points="400,190 570,260 400,330 230,260" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
  <text x="400" y="243" text-anchor="middle" font-size="14" fill="#191919">멤버 인스턴스 내부 방화벽/</text>
  <text x="400" y="260" text-anchor="middle" font-size="14" fill="#191919">애플리케이션에서 로드 밸런서</text>
  <text x="400" y="277" text-anchor="middle" font-size="14" fill="#191919">IP를 허용하는가?</text>

  <!-- Branch: Q1 -> F1 (아니오) -->
  <line x1="570" y1="260" x2="638" y2="260" stroke="#191919" stroke-width="2"/>
  <polygon points="638,253 638,267 650,260" fill="#191919"/>
  <text x="604" y="245" text-anchor="middle" font-size="13" fill="#646464">아니오</text>

  <rect x="650" y="215" width="220" height="90" fill="#334155"/>
  <text x="760" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">원인 1</text>
  <text x="760" y="272" text-anchor="middle" font-size="13" fill="#FFFFFF">내부 방화벽 또는</text>
  <text x="760" y="290" text-anchor="middle" font-size="13" fill="#FFFFFF">애플리케이션 ACL 차단</text>

  <!-- Arrow: Q1 -> Q2 (예) -->
  <line x1="400" y1="330" x2="400" y2="398" stroke="#191919" stroke-width="2"/>
  <polygon points="393,398 407,398 400,410" fill="#191919"/>
  <text x="420" y="375" text-anchor="middle" font-size="13" fill="#646464">예</text>

  <!-- ===================== Q2 Diamond ===================== -->
  <polygon points="400,410 570,480 400,550 230,480" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
  <text x="400" y="463" text-anchor="middle" font-size="14" fill="#191919">멤버 인스턴스에서 서비스가</text>
  <text x="400" y="480" text-anchor="middle" font-size="14" fill="#191919">실행 중이고 포트가</text>
  <text x="400" y="497" text-anchor="middle" font-size="14" fill="#191919">열려 있는가?</text>

  <!-- Branch: Q2 -> F2 (아니오) -->
  <line x1="570" y1="480" x2="638" y2="480" stroke="#191919" stroke-width="2"/>
  <polygon points="638,473 638,487 650,480" fill="#191919"/>
  <text x="604" y="465" text-anchor="middle" font-size="13" fill="#646464">아니오</text>

  <rect x="650" y="435" width="220" height="90" fill="#334155"/>
  <text x="760" y="472" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">원인 2</text>
  <text x="760" y="497" text-anchor="middle" font-size="13" fill="#FFFFFF">서비스 비정상</text>

  <!-- Arrow: Q2 -> Q3 (예) -->
  <line x1="400" y1="550" x2="400" y2="618" stroke="#191919" stroke-width="2"/>
  <polygon points="393,618 407,618 400,630" fill="#191919"/>
  <text x="420" y="595" text-anchor="middle" font-size="13" fill="#646464">예</text>

  <!-- ===================== Q3 Diamond ===================== -->
  <polygon points="400,630 570,700 400,770 230,700" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
  <text x="400" y="683" text-anchor="middle" font-size="14" fill="#191919">헬스 체크 프로토콜, 포트,</text>
  <text x="400" y="700" text-anchor="middle" font-size="14" fill="#191919">URL이 실제 서비스와</text>
  <text x="400" y="717" text-anchor="middle" font-size="14" fill="#191919">일치하는가?</text>

  <!-- Branch: Q3 -> F3 (아니오) -->
  <line x1="570" y1="700" x2="638" y2="700" stroke="#191919" stroke-width="2"/>
  <polygon points="638,693 638,707 650,700" fill="#191919"/>
  <text x="604" y="685" text-anchor="middle" font-size="13" fill="#646464">아니오</text>

  <rect x="650" y="655" width="220" height="90" fill="#334155"/>
  <text x="760" y="690" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">원인 3</text>
  <text x="760" y="712" text-anchor="middle" font-size="13" fill="#FFFFFF">헬스 체크 설정</text>
  <text x="760" y="730" text-anchor="middle" font-size="13" fill="#FFFFFF">불일치</text>

  <!-- Arrow: Q3 -> Q4 (예) -->
  <line x1="400" y1="770" x2="400" y2="838" stroke="#191919" stroke-width="2"/>
  <polygon points="393,838 407,838 400,850" fill="#191919"/>
  <text x="420" y="815" text-anchor="middle" font-size="13" fill="#646464">예</text>

  <!-- ===================== Q4 Diamond ===================== -->
  <polygon points="400,850 570,920 400,990 230,920" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
  <text x="400" y="912" text-anchor="middle" font-size="14" fill="#191919">서버 응답이 타임아웃</text>
  <text x="400" y="930" text-anchor="middle" font-size="14" fill="#191919">이내에 완료되는가?</text>

  <!-- Branch: Q4 -> F4 (아니오) -->
  <line x1="570" y1="920" x2="638" y2="920" stroke="#191919" stroke-width="2"/>
  <polygon points="638,913 638,927 650,920" fill="#191919"/>
  <text x="604" y="905" text-anchor="middle" font-size="13" fill="#646464">아니오</text>

  <rect x="650" y="875" width="220" height="90" fill="#334155"/>
  <text x="760" y="912" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">원인 4</text>
  <text x="760" y="935" text-anchor="middle" font-size="13" fill="#FFFFFF">타임아웃 초과</text>

  <!-- Arrow: Q4 -> F5 (예) -->
  <line x1="400" y1="990" x2="400" y2="1058" stroke="#191919" stroke-width="2"/>
  <polygon points="393,1058 407,1058 400,1070" fill="#191919"/>
  <text x="420" y="1035" text-anchor="middle" font-size="13" fill="#646464">예</text>

  <!-- ===================== F5 Result Box ===================== -->
  <rect x="270" y="1070" width="260" height="90" fill="#334155"/>
  <text x="400" y="1107" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">원인 5</text>
  <text x="400" y="1132" text-anchor="middle" font-size="13" fill="#FFFFFF">멤버 등록 포트 오류</text>

</svg>
